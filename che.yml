##[>] 🤖🤖
repo:
  include:
    repoTemplate:
      - files:
          - source: templates/1-env/local.env.example
            dest:
              - {path: .env, options: {writeType: mergeUpsert}}
          - {source: templates/2-data/makefile-agents.md.repo.tpl, dest: [assets/data/makefile.agents.md]}
          - {source: templates/2-data/repo-structure.md.repo.tpl, dest: [assets/data/repo-structure.md]}
          - {source: templates/3-audience/README.md.repo.tpl, dest: [README.md]}
          - source: templates/3-audience/AGENTS.md.repo.tpl
            dest:
              - CLAUDE.md
              - {path: AGENTS.md, options: {renderReferencedFiles: true}}

gitlabGroup:
  options: {onlyIf: ['env:GITLAB_GROUP']}
  include:
    runScripts:
      - ci/zsh/scripts/bootstrap/10-clone.zsh
      - ci/zsh/scripts/bootstrap/20-index.zsh
##[<] 🤖🤖
