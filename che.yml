# yaml-language-server: $schema=https://gitlab.com/konradodwrot/go-modules/-/raw/main/che/assets/data/che.schema.json
##[>] 🤖🤖
ontoRepo:
  options: {autoExec: true}
  include:
    renderTemplates:
      - files:
          - source: templates/1-env/local.env.example
            dest:
              - {path: .env, options: {writeType: mergeUpsert}}
          - {source: templates/2-data/makefile-agents.md.ontoRepo.tpl, dest: [assets/data/makefile.agents.md]}
          - {source: templates/2-data/repo-structure.md.ontoRepo.tpl, dest: [assets/data/repo-structure.md]}
          - {source: templates/3-audience/README.md.ontoRepo.tpl, dest: [README.md]}
          - source: templates/3-audience/AGENTS.md.ontoRepo.tpl
            dest:
              - CLAUDE.md
              - {path: AGENTS.md, options: {renderReferencedFiles: true}}

gitlabGroup:
  options: {autoExec: true, execIf: ['env:GITLAB_GROUP']}
  include:
    runScripts:
      - ci/zsh/scripts/bootstrap/10-clone.zsh
      - ci/zsh/scripts/bootstrap/20-index.zsh

claude-agents:
  options: {autoExec: true, execIf: ['builtin:isVirt']}
  include:
    renderTemplates:
      - ctx: {repo: Workspace}
        files:
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/ro.md", dest: [{path: .claude/agents/ro.md, options: {skipAutoGeneratedHeader: true}}]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/rw.md", dest: [{path: .claude/agents/rw.md, options: {skipAutoGeneratedHeader: true}}]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/settings.json", dest: [{path: .claude/settings.json, options: {skipAutoGeneratedHeader: true}}]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/claude-gitignore", dest: [.claude/.gitignore]}
##[<] 🤖🤖
