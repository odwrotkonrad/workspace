extends:
  - ~/.config/lefthook/lefthook.yml

pre-commit:
  jobs:
    - name: docsgen
      env:
        MK_DRY_RUN: ""
      run: make render-templates && { git diff --exit-code || { echo "regeneration changed tracked files (diff above), restage and re-commit"; exit 1; } }

    - name: validate-yml
      glob: "*.{yml,yaml}"
      run: for f in {staged_files}; do yq e '.' "$f" > /dev/null && echo "validated $f" || exit 1; done

pre-push:
  jobs:
    - name: glab-ci-lint
      glob: ".gitlab-ci.yml"
      run: glab ci lint {push_files}
##[<] 🤖
